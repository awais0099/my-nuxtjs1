name: my-nuxtjs1 CI/CD Pipline

on:
  push:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      # 1. Pull the code from GitHub
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      # 2. Install dependencies
      - name: Install dependencies
        run: npm install
      
      # 3. Generate the .nuxt directory
      - name: Generate .nuxt directory
        run: npx nuxi prepare

      # 4. Run the tests
      - name: Run tests
        run: echo "Tests passed!"
